name: "Build TCC package"
description: "Stamp the version, sync the in-addon changelog, and build the addon ZIP (two addon folders at the archive root, no dev/Python files)."

inputs:
  version:
    description: "Explicit version (e.g. 1.2.0-beta.3). Empty = derive from the pushed tag."
    required: false
    default: ""

outputs:
  version:
    description: "Resolved version string."
    value: ${{ steps.ver.outputs.version }}
  reltype:
    description: "release | beta | alpha (inferred from the version string)."
    value: ${{ steps.ver.outputs.reltype }}
  zip:
    description: "Workspace-relative path to the built ZIP."
    value: ${{ steps.build.outputs.zip }}
  patch:
    description: "Retail patch derived from the TOC Interface (e.g. 12.0.7)."
    value: ${{ steps.build.outputs.patch }}

runs:
  using: composite
  steps:
    - name: Determine version and release type
      id: ver
      shell: bash
      run: |
        VER="${{ inputs.version }}"
        [ -z "$VER" ] && VER="${GITHUB_REF_NAME#v}"   # strip leading v from the tag
        echo "version=$VER" >> "$GITHUB_OUTPUT"
        case "$VER" in
          *alpha*) RT=alpha ;;
          *beta*)  RT=beta ;;
          *)       RT=release ;;
        esac
        echo "reltype=$RT" >> "$GITHUB_OUTPUT"
        echo "Building version '$VER' (release type: $RT)"

    - name: Stamp version into both TOCs
      shell: bash
      run: |
        VER="${{ steps.ver.outputs.version }}"
        sed -i -E "s/^## Version:.*/## Version: ${VER}/" TwistedsCombatCues/TwistedsCombatCues.toc
        sed -i -E "s/^## Version:.*/## Version: ${VER}/" TwistedsCombatCues_DB/TwistedsCombatCues_DB.toc
        grep -H '## Version:' */*.toc

    - name: Sync in-addon changelog from CHANGELOG.md
      shell: bash
      run: |
        set -euo pipefail
        MD="TwistedsCombatCues/CHANGELOG.md"
        LUA="TwistedsCombatCues/Changelog.lua"
        test -f "$MD" || { echo "::error::$MD missing"; exit 1; }
        {
          echo '-- AUTO-GENERATED from CHANGELOG.md -- do not edit by hand.'
          echo '-- Regenerated by the release workflow at package time.'
          echo 'local _, TCC = ...'
          echo 'TCC.CHANGELOG = [==['
          cat "$MD"
          echo ']==]'
        } > "$LUA"
        echo "Synced $LUA from $MD"

    - name: Build ZIP (addon folders at archive root)
      id: build
      shell: bash
      run: |
        set -euo pipefail
        VER="${{ steps.ver.outputs.version }}"
        WS="$PWD"
        STAGE="$(mktemp -d)"
        cp -r TwistedsCombatCues     "$STAGE/TwistedsCombatCues"
        cp -r TwistedsCombatCues_DB  "$STAGE/TwistedsCombatCues_DB"

        # --- exclusions (dev-only / VCS / caches / archives) ---
        find "$STAGE" -type d \( \
            -name Tools -o -name tools -o -name scripts -o -name build-tools -o -name tests -o -name test \
            -o -name __pycache__ -o -name .pytest_cache -o -name .mypy_cache -o -name .ruff_cache \
            -o -name venv -o -name .venv -o -name env \
            -o -name .git -o -name .github -o -name .vscode -o -name .idea \
          \) -prune -exec rm -rf {} +
        find "$STAGE" -type f \( \
            -name '*.py' -o -name '*.pyc' -o -name '*.pyo' -o -name '*.pyd' \
            -o -name '*.log' -o -name '*.bak' -o -name '*.tmp' -o -name '*.zip' -o -name '*.orig' \
          \) -delete

        # --- validation ---
        if find "$STAGE" \( -name '*.py' -o -name '__pycache__' -o -name '.git' \) | grep -q .; then
          echo "::error::dev/python files leaked into the package"; exit 1
        fi
        test -f "$STAGE/TwistedsCombatCues/TwistedsCombatCues.toc"       || { echo "::error::missing main TOC"; exit 1; }
        test -f "$STAGE/TwistedsCombatCues_DB/TwistedsCombatCues_DB.toc" || { echo "::error::missing DB TOC"; exit 1; }
        TOP="$(cd "$STAGE" && ls -1 | sort | tr '\n' ' ')"
        if [ "$TOP" != "TwistedsCombatCues TwistedsCombatCues_DB " ]; then
          echo "::error::staging root is not exactly the two addon folders: $TOP"; exit 1
        fi

        ZIP="TwistedsCombatCues-${VER}.zip"
        ( cd "$STAGE" && zip -r -X "$WS/$ZIP" TwistedsCombatCues TwistedsCombatCues_DB >/dev/null )
        echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

        # Retail patch from the TOC Interface (120007 -> 12.0.7), for the uploaders.
        IFACE="$(grep -m1 '## Interface:' TwistedsCombatCues/TwistedsCombatCues.toc | tr -dc '0-9')"
        MAJ=$((10#${IFACE:0:$((${#IFACE}-4))})); MIN=$((10#${IFACE: -4:2})); PAT=$((10#${IFACE: -2}))
        echo "patch=${MAJ}.${MIN}.${PAT}" >> "$GITHUB_OUTPUT"

        echo "Built $ZIP (retail patch ${MAJ}.${MIN}.${PAT})"
        unzip -l "$ZIP" | head -20
