name: Package and release

# Automatic packaging for Twisteds Combat Cues, driven from your own GitHub account.
#
# Push a version tag (e.g. `v1.2.0-beta.1`) and this workflow:
#   1. reads the version from the tag,
#   2. stamps it into both TOCs,
#   3. builds a CurseForge-ready ZIP from the `addon/` folder (the two addon folders
#      end up at the ZIP root - no wrapper, no dev/Python files),
#   4. publishes a GitHub Release with the ZIP attached (pre-release for alpha/beta),
#   5. uploads that same ZIP straight to CurseForge via the CurseForge Upload API.
#
# CurseForge delivery uses two repo secrets:
#   CF_API_TOKEN   - a CurseForge API token (https://legacy.curseforge.com/account/api-tokens)
#   CF_PROJECT_ID  - the numeric CurseForge project id (from the project's "About" box)
# If either secret is absent the CurseForge step is skipped (the GitHub Release still
# publishes), so you can tag freely before wiring CurseForge up.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.0-beta.1)"
        required: true

permissions:
  contents: write   # create the GitHub release + upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version and release type
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF_NAME#v}"    # strip leading v from the tag
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          case "$VER" in
            *alpha*) RT=alpha ;;
            *beta*)  RT=beta ;;
            *)       RT=release ;;
          esac
          echo "reltype=$RT" >> "$GITHUB_OUTPUT"
          echo "Building version '$VER' (release type: $RT)"

      - name: Stamp version into both TOCs
        run: |
          VER="${{ steps.ver.outputs.version }}"
          sed -i -E "s/^## Version:.*/## Version: ${VER}/" TwistedsCombatCues/TwistedsCombatCues.toc
          sed -i -E "s/^## Version:.*/## Version: ${VER}/" TwistedsCombatCues_DB/TwistedsCombatCues_DB.toc
          grep -H '## Version:' */*.toc

      - name: Sync in-addon changelog from CHANGELOG.md
        run: |
          set -euo pipefail
          MD="TwistedsCombatCues/CHANGELOG.md"
          LUA="TwistedsCombatCues/Changelog.lua"
          test -f "$MD" || { echo "::error::$MD missing"; exit 1; }
          {
            echo '-- AUTO-GENERATED from CHANGELOG.md -- do not edit by hand.'
            echo '-- Regenerated by the release workflow at package time.'
            echo 'local _, TCC = ...'
            echo 'TCC.CHANGELOG = [==['
            cat "$MD"
            echo ']==]'
          } > "$LUA"
          echo "Synced $LUA from $MD"

      - name: Build ZIP (addon/ folders at archive root)
        id: build
        run: |
          set -euo pipefail
          VER="${{ steps.ver.outputs.version }}"
          WS="$PWD"
          STAGE="$(mktemp -d)"
          cp -r TwistedsCombatCues     "$STAGE/TwistedsCombatCues"
          cp -r TwistedsCombatCues_DB  "$STAGE/TwistedsCombatCues_DB"

          # --- exclusions (dev-only / VCS / caches / archives) ---
          find "$STAGE" -type d \( \
              -name Tools -o -name tools -o -name scripts -o -name build-tools -o -name tests -o -name test \
              -o -name __pycache__ -o -name .pytest_cache -o -name .mypy_cache -o -name .ruff_cache \
              -o -name venv -o -name .venv -o -name env \
              -o -name .git -o -name .github -o -name .vscode -o -name .idea \
            \) -prune -exec rm -rf {} +
          find "$STAGE" -type f \( \
              -name '*.py' -o -name '*.pyc' -o -name '*.pyo' -o -name '*.pyd' \
              -o -name '*.log' -o -name '*.bak' -o -name '*.tmp' -o -name '*.zip' -o -name '*.orig' \
            \) -delete

          # --- validation ---
          if find "$STAGE" \( -name '*.py' -o -name '__pycache__' -o -name '.git' \) | grep -q .; then
            echo "::error::dev/python files leaked into the package"; exit 1
          fi
          test -f "$STAGE/TwistedsCombatCues/TwistedsCombatCues.toc"       || { echo "::error::missing main TOC"; exit 1; }
          test -f "$STAGE/TwistedsCombatCues_DB/TwistedsCombatCues_DB.toc" || { echo "::error::missing DB TOC"; exit 1; }
          TOP="$(cd "$STAGE" && ls -1 | sort | tr '\n' ' ')"
          if [ "$TOP" != "TwistedsCombatCues TwistedsCombatCues_DB " ]; then
            echo "::error::staging root is not exactly the two addon folders: $TOP"; exit 1
          fi

          ZIP="TwistedsCombatCues-${VER}.zip"
          ( cd "$STAGE" && zip -r -X "$WS/$ZIP" TwistedsCombatCues TwistedsCombatCues_DB >/dev/null )
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "Built $ZIP ($(du -h "$ZIP" | cut -f1))"
          unzip -l "$ZIP" | head -20

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.zip }}
          prerelease: ${{ steps.ver.outputs.reltype != 'release' }}
          generate_release_notes: true

      - name: Upload to CurseForge
        env:
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_PROJECT_ID: ${{ secrets.CF_PROJECT_ID }}
          VER:           ${{ steps.ver.outputs.version }}
          RELTYPE:       ${{ steps.ver.outputs.reltype }}
          ZIP:           ${{ steps.build.outputs.zip }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_PROJECT_ID:-}" ]; then
            echo "::warning::CF_API_TOKEN / CF_PROJECT_ID not set - skipping CurseForge upload."
            exit 0
          fi

          # Derive the CurseForge game-version name from the TOC Interface (120007 -> 12.0.7).
          IFACE="$(grep -m1 '## Interface:' TwistedsCombatCues/TwistedsCombatCues.toc | tr -dc '0-9')"
          MAJ=$((10#${IFACE:0:$((${#IFACE}-4))})); MIN=$((10#${IFACE: -4:2})); PAT=$((10#${IFACE: -2}))
          GAMEVER="${MAJ}.${MIN}.${PAT}"
          echo "Game version from TOC: $GAMEVER (Interface $IFACE)"

          # Map that name to CurseForge's numeric game-version id.
          GVID="$(curl -sf -H "X-Api-Token: $CF_API_TOKEN" \
                    https://wow.curseforge.com/api/game/versions \
                  | jq -r --arg n "$GAMEVER" '[.[] | select(.name==$n)] | (first // {}) | .id // empty')"
          if [ -z "$GVID" ]; then
            echo "::error::CurseForge has no game version named '$GAMEVER' yet. Add it on the project's file page manually, or wait until CurseForge lists that patch."
            exit 1
          fi
          echo "CurseForge game-version id: $GVID"

          # Changelog for CurseForge = the latest section of TwistedsCombatCues/CHANGELOG.md
          # (from the first "## " heading up to the next one). Fall back to a one-liner.
          CHANGELOG="$(awk '/^## /{c++} c==1' TwistedsCombatCues/CHANGELOG.md 2>/dev/null || true)"
          [ -z "$CHANGELOG" ] && CHANGELOG="Twisteds Combat Cues ${VER}"

          META="$(jq -nc \
            --arg cl "$CHANGELOG" \
            --arg rt "$RELTYPE" \
            --argjson gv "[$GVID]" \
            '{changelog:$cl, changelogType:"markdown", gameVersions:$gv, releaseType:$rt}')"

          echo "Uploading $ZIP to CurseForge project $CF_PROJECT_ID (releaseType=$RELTYPE)..."
          # metadata goes via --form-string (NOT -F): the JSON can contain ';', '@', '<'
          # (e.g. a ';' in the changelog), which -F would misread as field parameters and
          # corrupt the JSON. The file field keeps -F so '@' means "upload this file".
          HTTP="$(curl -sS -o /tmp/cf_resp.json -w '%{http_code}' -X POST \
                    -H "X-Api-Token: $CF_API_TOKEN" \
                    --form-string "metadata=$META" \
                    -F "file=@${ZIP}" \
                    "https://wow.curseforge.com/api/projects/${CF_PROJECT_ID}/upload-file")"
          echo "HTTP $HTTP"; cat /tmp/cf_resp.json; echo
          case "$HTTP" in
            2*) echo "CurseForge upload OK (file id: $(jq -r '.id // "?"' /tmp/cf_resp.json))" ;;
            *)  echo "::error::CurseForge upload failed (HTTP $HTTP)"; exit 1 ;;
          esac
