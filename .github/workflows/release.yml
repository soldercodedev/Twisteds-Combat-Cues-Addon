name: Package and release

# Combined release, driven from your own GitHub account. Push a version tag
# (e.g. v1.2.0-beta.3) and this workflow builds the ZIP, publishes a GitHub Release, and
# uploads to BOTH CurseForge and Wago Addons. Each uploader is skipped if its secrets are
# absent, so you can tag before wiring a platform up.
#
# To publish to just ONE platform (e.g. to retry a failed upload), use the standalone
# "Publish to CurseForge" / "Publish to Wago Addons" workflows instead.
#
# Repo secrets:
#   CurseForge:  CF_API_TOKEN   (https://legacy.curseforge.com/account/api-tokens)
#                CF_PROJECT_ID  (numeric id from the project's "About" box)
#   Wago Addons: WAGO_API_KEY   (https://addons.wago.io/account/apikeys)
#                WAGO_PROJECT_ID (8-char id from https://addons.wago.io/developers)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.0-beta.3)"
        required: true

permissions:
  contents: write   # create the GitHub release + upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build package
        id: build
        uses: ./.github/actions/build
        with:
          version: ${{ github.event.inputs.version }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.zip }}
          prerelease: ${{ steps.build.outputs.reltype != 'release' }}
          generate_release_notes: true

      - name: Upload to CurseForge
        uses: ./.github/actions/curseforge-upload
        with:
          token:      ${{ secrets.CF_API_TOKEN }}
          project-id: ${{ secrets.CF_PROJECT_ID }}
          version:    ${{ steps.build.outputs.version }}
          reltype:    ${{ steps.build.outputs.reltype }}
          zip:        ${{ steps.build.outputs.zip }}
          patch:      ${{ steps.build.outputs.patch }}

      - name: Upload to Wago Addons
        uses: ./.github/actions/wago-upload
        with:
          api-key:    ${{ secrets.WAGO_API_KEY }}
          project-id: ${{ secrets.WAGO_PROJECT_ID }}
          version:    ${{ steps.build.outputs.version }}
          reltype:    ${{ steps.build.outputs.reltype }}
          zip:        ${{ steps.build.outputs.zip }}
          patch:      ${{ steps.build.outputs.patch }}
