name: Publish to Wago Addons

# Standalone Wago Addons publish (manual only). Builds the ZIP from the current checkout
# and uploads it to Wago - use it to retry a failed Wago upload, or to publish there
# without touching GitHub Releases or CurseForge. Needs WAGO_API_KEY + WAGO_PROJECT_ID.
#
# For the normal "publish everywhere on tag" flow, use the "Package and release" workflow.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.0-beta.3)"
        required: true

jobs:
  wago:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build package
        id: build
        uses: ./.github/actions/build
        with:
          version: ${{ github.event.inputs.version }}

      - name: Upload to Wago Addons
        uses: ./.github/actions/wago-upload
        with:
          api-key:    ${{ secrets.WAGO_API_KEY }}
          project-id: ${{ secrets.WAGO_PROJECT_ID }}
          version:    ${{ steps.build.outputs.version }}
          reltype:    ${{ steps.build.outputs.reltype }}
          zip:        ${{ steps.build.outputs.zip }}
          patch:      ${{ steps.build.outputs.patch }}
